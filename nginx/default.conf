server {
    listen 8080;
    listen [::]:8080;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Endpoint utilizado por Docker y Coolify
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # Archivos estáticos generados por Storybook
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché prolongada para recursos con hash
    location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|webp|ico|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Evita guardar en caché los documentos HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Cabeceras de seguridad básicas
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;

    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;
}